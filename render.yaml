databases:
  - name: karavay-db
    databaseName: karavay
    plan: free
    postgresMajorVersion: 16

services:
  - type: web
    name: karavay-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: karavay-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_ACCESS_TTL_MINUTES
        value: "15"
      - key: JWT_REFRESH_TTL_DAYS
        value: "7"
      - key: FRONTEND_ORIGIN
        value: https://karavay-frontend.onrender.com
      - key: INITIAL_ADMIN_EMAIL
        sync: false
      - key: INITIAL_ADMIN_PASSWORD
        sync: false

  - type: web
    name: karavay-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://karavay-backend.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
